<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Payment</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .box {
            width: 300px;
            margin: auto;
            margin-top: 100px;
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>💳 Payment</h2>

    <input placeholder="Card Number">
    <input placeholder="Expiry Date">
    <input placeholder="CVV">

    <button onclick="pay()">Pay Now</button>
</div>

<script>
function pay() {
    alert("Payment Successful 🎉");
    window.location.href = "index.html";
}
</script>

</body>
</html>
